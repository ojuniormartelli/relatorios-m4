name: Atualizar Dados Diários

on:
  schedule:
    # Todos os dias às 00:00 (horário Brasília = 03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:  # Permite executar manualmente

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci --omit=dev

      - name: 🔄 Buscar dados das APIs e atualizar
        run: node scripts/atualizar-dados.js
        env:
          # === Google Ads ===
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          
          # === Meta Ads ===
          META_ADS_TOKEN: ${{ secrets.META_ADS_TOKEN }}
          META_ADS_ACCOUNT_ID: ${{ secrets.META_ADS_ACCOUNT_ID }}

      - name: ✅ Verificar mudanças
        id: changes
        run: |
          if [ -z "$(git status -s)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 📝 Commitar e push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "M4 Bot"
          git config user.email "bot@m4mkt.com.br"
          git add src/data/
          git commit -m "📊 dados: atualização automática $(date +'%d/%m/%Y')"
          git push
